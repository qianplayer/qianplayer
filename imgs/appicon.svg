<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="playShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="12" flood-color="#4fc3f7" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 光晕 -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- 胶片条纹（左） -->
  <g opacity="0.12" fill="#4fc3f7">
    <rect x="56"  y="100" width="18" height="18" rx="3"/>
    <rect x="56"  y="132" width="18" height="18" rx="3"/>
    <rect x="56"  y="164" width="18" height="18" rx="3"/>
    <rect x="56"  y="196" width="18" height="18" rx="3"/>
    <rect x="56"  y="228" width="18" height="18" rx="3"/>
    <rect x="56"  y="260" width="18" height="18" rx="3"/>
    <rect x="56"  y="292" width="18" height="18" rx="3"/>
    <rect x="56"  y="324" width="18" height="18" rx="3"/>
    <rect x="56"  y="356" width="18" height="18" rx="3"/>
    <rect x="56"  y="388" width="18" height="18" rx="3"/>
  </g>

  <!-- 胶片条纹（右） -->
  <g opacity="0.12" fill="#4fc3f7">
    <rect x="438" y="100" width="18" height="18" rx="3"/>
    <rect x="438" y="132" width="18" height="18" rx="3"/>
    <rect x="438" y="164" width="18" height="18" rx="3"/>
    <rect x="438" y="196" width="18" height="18" rx="3"/>
    <rect x="438" y="228" width="18" height="18" rx="3"/>
    <rect x="438" y="260" width="18" height="18" rx="3"/>
    <rect x="438" y="292" width="18" height="18" rx="3"/>
    <rect x="438" y="324" width="18" height="18" rx="3"/>
    <rect x="438" y="356" width="18" height="18" rx="3"/>
    <rect x="438" y="388" width="18" height="18" rx="3"/>
  </g>

  <!-- 播放按钮外圈 -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#playGrad)"
          stroke-width="5" opacity="0.6" filter="url(#playShadow)"/>

  <!-- 播放三角（居中放大） -->
  <polygon points="224,190 224,322 336,256"
           fill="url(#playGrad)" filter="url(#playShadow)"/>
</svg>
